<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Papplebee's Shopping List App</title>

	<link rel="stylesheet" type="text/css" href="main.css">

	<script src="js/jquery-1.11.1.min.js"></script>
	<script src="js/app.js"></script>
</head>

<body>
	<div id="wrapper">
		

		<div id="shopping-list-app">
			
			<div id="pad-top">
				<h1>Shopping List</h1>
			</div>

			<div id="add-item-div">
				<form id="add-item-form">
					<input class="item-field" type="text" placeholder="Enter Item Here..." name="shopping-item">
					
					<button title="Add to List" class="add-button"></button>
				</form>
			</div>

			<div id="list">
				<div class="item">
					<button title="Tick" class="btn untick"></button>
					<p>Add new items above</p>
					<button title="Delete" class="btn delete"></button>
				</div>	

				<div class="item done">
					<button title="Untick" class="btn tick"></button>
					<p>This is a completed item</p>
					<button title="Delete" class="btn delete"></button>
				</div>	
			</div>

		</div>

		<div id="footer">
			<p>Designed and Built by <a href="mailto:peterapplebee@gmail.com">Peter Applebee</a> 2014</p>
		</div>
	</div>
</body>
</html>
